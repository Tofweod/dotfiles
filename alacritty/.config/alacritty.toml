[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#18191a'
foreground = '#c5c5c5'

[colors.cursor]
text   = '#18191a' # Apply background color to color of text inside cursor
cursor = '#c5c5c5' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#18191a' # Same as above
cursor  = '#c5c5c5'

[colors.search.matches]
foreground = '#18191a' # Same as above
background = '#c5c5c5' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#515253'
background = '#c5c5c5'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#18191a'
red     = '#394b5d'
green   = '#495f6e'
yellow  = '#747e8a'
blue    = '#8f9db2'
magenta = '#b2a6af'
cyan    = '#a1afbd'
white   = '#c5c5c5'

[colors.bright]
black   = '#515253'
red     = '#394b5d'
green   = '#495f6e'
yellow  = '#747e8a'
blue    = '#8f9db2'
magenta = '#b2a6af'
cyan    = '#a1afbd'
white   = '#c5c5c5'
# END WAL
