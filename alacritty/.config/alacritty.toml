[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#1a1b1c'
foreground = '#c5c6c6'

[colors.cursor]
text   = '#1a1b1c' # Apply background color to color of text inside cursor
cursor = '#c5c6c6' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#1a1b1c' # Same as above
cursor  = '#c5c6c6'

[colors.search.matches]
foreground = '#1a1b1c' # Same as above
background = '#c5c6c6' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#535454'
background = '#c5c6c6'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#1a1b1c'
red     = '#4a5869'
green   = '#56677a'
yellow  = '#5982b4'
blue    = '#778494'
magenta = '#89a2bf'
cyan    = '#a2bad2'
white   = '#c5c6c6'

[colors.bright]
black   = '#535454'
red     = '#4a5869'
green   = '#56677a'
yellow  = '#5982b4'
blue    = '#778494'
magenta = '#89a2bf'
cyan    = '#a2bad2'
white   = '#c5c6c6'
# END WAL
