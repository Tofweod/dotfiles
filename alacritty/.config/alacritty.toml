[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#191615'
foreground = '#c5c4c4'

[colors.cursor]
text   = '#191615' # Apply background color to color of text inside cursor
cursor = '#c5c4c4' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#191615' # Same as above
cursor  = '#c5c4c4'

[colors.search.matches]
foreground = '#191615' # Same as above
background = '#c5c4c4' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#52504f'
background = '#c5c4c4'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#191615'
red     = '#6e2f20'
green   = '#8a6546'
yellow  = '#967a66'
blue    = '#b3734f'
magenta = '#bd9172'
cyan    = '#d4bc8f'
white   = '#c5c4c4'

[colors.bright]
black   = '#52504f'
red     = '#6e2f20'
green   = '#8a6546'
yellow  = '#967a66'
blue    = '#b3734f'
magenta = '#bd9172'
cyan    = '#d4bc8f'
white   = '#c5c4c4'
# END WAL
