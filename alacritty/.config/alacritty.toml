[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#1c1c1a'
foreground = '#c6c6c5'

[colors.cursor]
text   = '#1c1c1a' # Apply background color to color of text inside cursor
cursor = '#c6c6c5' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#1c1c1a' # Same as above
cursor  = '#c6c6c5'

[colors.search.matches]
foreground = '#1c1c1a' # Same as above
background = '#c6c6c5' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#545453'
background = '#c6c6c5'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#1c1c1a'
red     = '#775b49'
green   = '#918a83'
yellow  = '#93a4ba'
blue    = '#c2a18f'
magenta = '#a6bdc8'
cyan    = '#d1baa1'
white   = '#c6c6c5'

[colors.bright]
black   = '#545453'
red     = '#775b49'
green   = '#918a83'
yellow  = '#93a4ba'
blue    = '#c2a18f'
magenta = '#a6bdc8'
cyan    = '#d1baa1'
white   = '#c6c6c5'
# END WAL
