[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#161818'
foreground = '#c4c5c5'

[colors.cursor]
text   = '#161818' # Apply background color to color of text inside cursor
cursor = '#c4c5c5' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#161818' # Same as above
cursor  = '#c4c5c5'

[colors.search.matches]
foreground = '#161818' # Same as above
background = '#c4c5c5' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#505151'
background = '#c4c5c5'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#161818'
red     = '#305262'
green   = '#426e87'
yellow  = '#4790bf'
blue    = '#678b9d'
magenta = '#669cbc'
cyan    = '#7cc7e1'
white   = '#c4c5c5'

[colors.bright]
black   = '#505151'
red     = '#305262'
green   = '#426e87'
yellow  = '#4790bf'
blue    = '#678b9d'
magenta = '#669cbc'
cyan    = '#7cc7e1'
white   = '#c4c5c5'
# END WAL
