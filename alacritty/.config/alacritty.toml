[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#1a1a1c'
foreground = '#c5c5c6'

[colors.cursor]
text   = '#1a1a1c' # Apply background color to color of text inside cursor
cursor = '#c5c5c6' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#1a1a1c' # Same as above
cursor  = '#c5c5c6'

[colors.search.matches]
foreground = '#1a1a1c' # Same as above
background = '#c5c5c6' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#535354'
background = '#c5c5c6'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#1a1a1c'
red     = '#3b5073'
green   = '#695475'
yellow  = '#447292'
blue    = '#7b7994'
magenta = '#929bbf'
cyan    = '#bfa5bf'
white   = '#c5c5c6'

[colors.bright]
black   = '#535354'
red     = '#3b5073'
green   = '#695475'
yellow  = '#447292'
blue    = '#7b7994'
magenta = '#929bbf'
cyan    = '#bfa5bf'
white   = '#c5c5c6'
# END WAL
