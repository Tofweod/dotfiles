[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#1b1a18'
foreground = '#c6c5c5'

[colors.cursor]
text   = '#1b1a18' # Apply background color to color of text inside cursor
cursor = '#c6c5c5' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#1b1a18' # Same as above
cursor  = '#c6c5c5'

[colors.search.matches]
foreground = '#1b1a18' # Same as above
background = '#c6c5c5' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#545351'
background = '#c6c5c5'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#1b1a18'
red     = '#7f3b29'
green   = '#7c6548'
yellow  = '#cc614b'
blue    = '#958b74'
magenta = '#b99781'
cyan    = '#beb29f'
white   = '#c6c5c5'

[colors.bright]
black   = '#545351'
red     = '#7f3b29'
green   = '#7c6548'
yellow  = '#cc614b'
blue    = '#958b74'
magenta = '#b99781'
cyan    = '#beb29f'
white   = '#c6c5c5'
# END WAL
