[env]
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "MonacoB"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Monaco"
style = "Italic"

[font.normal]
family = "Monaco Nerd Font"
style = "Regular"

[window.dimensions]
columns = 90
lines = 28

[keyboard]
bindings = [
   { key = "Return", mods = "Control", action = "SpawnNewInstance" }
]
# BEGIN WAL
[colors.primary]
background = '#1a1b1a'
foreground = '#c5c6c5'

[colors.cursor]
text   = '#1a1b1a' # Apply background color to color of text inside cursor
cursor = '#c5c6c5' # Apply foreground color to color of cursor

[colors.vi_mode_cursor]
text    = '#1a1b1a' # Same as above
cursor  = '#c5c6c5'

[colors.search.matches]
foreground = '#1a1b1a' # Same as above
background = '#c5c6c5' # Apply bright/white color to bg color of matching search

[colors.search.focused_match]
foreground = 'CellBackground'
background = 'CellForeground'

[colors.line_indicator]
foreground = 'None'
background = 'None'

[colors.footer_bar]
foreground = '#535453'
background = '#c5c6c5'

[colors.selection]
text       = 'CellBackground'
background = 'CellForeground'

[colors.normal]
black   = '#1a1b1a'
red     = '#60594c'
green   = '#696852'
yellow  = '#8b857d'
blue    = '#9da1b6'
magenta = '#b5a499'
cyan    = '#c4b6a4'
white   = '#c5c6c5'

[colors.bright]
black   = '#535453'
red     = '#60594c'
green   = '#696852'
yellow  = '#8b857d'
blue    = '#9da1b6'
magenta = '#b5a499'
cyan    = '#c4b6a4'
white   = '#c5c6c5'
# END WAL
